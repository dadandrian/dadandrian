<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>MIDI → SOLFA Chorale</title>

  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
  <script src="https://unpkg.com/tone"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    /* ---------- Style général ---------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
      color: #e0e0ff;
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 1400px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a0f0ff, #c0a0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      text-shadow: 0 0 15px #6a4cff88;
      border-left: 6px solid #7a5cff;
      padding-left: 1.5rem;
    }

    /* ---------- Panneau de contrôle ---------- */
    .control-panel {
      background: rgba(20, 25, 45, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(120, 100, 255, 0.3);
      border-radius: 32px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
    }

    .file-input {
      background: #1e2440;
      border-radius: 60px;
      padding: 0.5rem 1rem;
      border: 1px solid #4a4e7a;
      color: #e0e0ff;
      font-size: 0.95rem;
      width: 250px;
      cursor: pointer;
    }

    .file-input::-webkit-file-upload-button {
      background: #2f3760;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      margin-right: 1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 8px #3f3faa55;
    }

    .file-input::-webkit-file-upload-button:hover {
      background: #3f4a8a;
      transform: scale(1.02);
    }

    .param-group {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #0f1422cc;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      border: 1px solid #3f3f7a;
    }

    .param-group label {
      font-weight: 500;
      color: #b0b0ff;
    }

    .param-group input {
      background: #262e50;
      border: 1px solid #5a5e9a;
      color: white;
      padding: 0.5rem 0.8rem;
      border-radius: 30px;
      width: 80px;
      text-align: center;
      font-weight: bold;
      outline: none;
      transition: 0.2s;
    }

    .param-group input:focus {
      border-color: #a080ff;
      box-shadow: 0 0 12px #8055ff;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-left: auto;
    }

    button {
      background: #1f2542;
      border: 1px solid #4c4f82;
      color: #d0d0ff;
      padding: 0.7rem 1.6rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 12px #00000040;
      backdrop-filter: blur(5px);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    button:hover {
      background: #2f3770;
      border-color: #9b8cff;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px #3f318855;
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 4px 8px black;
    }

    /* ---------- Grille de solfège ---------- */
    .score-container {
      background: rgba(10, 12, 26, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 2rem 1.5rem;
      border: 1px solid #414773;
      box-shadow: inset 0 0 30px #00000080, 0 20px 30px #000000b3;
    }

    table {
      border-collapse: collapse;
      margin: 2rem 0;
      background: #0c1020e0;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 30px -10px black;
      width: auto;
      border: 1px solid #5a4c9a;
    }

    td {
      width: 90px;
      height: 48px;
      text-align: center;
      vertical-align: middle;
      border-right: 1px solid #333a66;
      border-bottom: 1px solid #22284a;
      font-size: 1.2rem;
      font-family: 'Courier New', monospace;
      font-weight: 600;
      color: #f0f0ff;
      background: #151e34;
      transition: background 0.1s;
      padding: 0 4px;
    }

    td.editable {
      background: #252e50;
      box-shadow: inset 0 0 0 2px #9f8cff;
    }

    .thick-left {
      border-left: 4px solid #a694ff;
    }

    .thick-right {
      border-right: 4px solid #a694ff;
    }

    /* Ligne de voix en alternance */
    tr:nth-child(even) td {
      background: #10172a;
    }

    tr:nth-child(odd) td {
      background: #1b2340;
    }

    td:first-child {
      padding-left: 4px;
    }

    td:last-child {
      padding-right: 4px;
    }

    /* petits écrans */
    @media (max-width: 1000px) {
      .control-panel {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-group {
        margin-left: 0;
        justify-content: center;
      }

      td {
        width: 70px;
        height: 42px;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>♫ MIDI → SOLFA Rythmique ♫</h1>

    <div class="control-panel">
      <input type="file" id="midiFile" class="file-input" accept=".mid,.midi">

      <div class="param-group">
        <label>⌛ Temps/mesure</label>
        <input type="number" id="meter" value="4" min="1" max="12">
      </div>

      <div class="param-group">
        <label>🎵 BPM</label>
        <input type="number" id="bpm" value="90" min="20" max="300">
      </div>

      <div class="btn-group">
        <button onclick="convertMidi()">⟳ Convertir</button>
        <button onclick="toggleEdit()">✎ Éditer</button>
        <button onclick="saveScore()">💾 Sauvegarder</button>
        <button onclick="exportExcel()">📊 Excel</button>
        <button onclick="playMidi()">▶ Lecture</button>
        <button onclick="stopMidi()">⏹ Stop</button>
      </div>
    </div>

    <div class="score-container">
      <div id="score"></div>
    </div>
  </div>

  <script>
    let midiData = null
    let synth = null
    let part = null
    let editMode = false

    const solfa = ["d", "di", "r", "ri", "m", "f", "fi", "s", "si", "l", "ta", "t"]

    function noteToSolfa(midi) {
      return solfa[midi % 12]
    }

    // ---------- Conversion améliorée avec détection précise des contretemps ----------
    async function convertMidi() {
      const meter = parseInt(document.getElementById("meter").value)
      const fileInput = document.getElementById("midiFile")
      if (!fileInput.files.length) {
        alert("Choisissez un fichier MIDI")
        return
      }

      const buffer = await fileInput.files[0].arrayBuffer()
      const midi = new Midi(buffer)
      midiData = midi

      const ppq = midi.header.ppq
      let firstTick = Infinity
      midi.tracks.forEach(track => {
        track.notes.forEach(n => {
          if (n.ticks < firstTick) firstTick = n.ticks
        })
      })

      const voices = []  // 4 voix max

      for (let v = 0; v < 4; v++) {
        const beats = []
        if (!midi.tracks[v]) {
          voices.push([])
          continue
        }

        // Récupérer et trier les notes par temps
        const notes = midi.tracks[v].notes
          .map(n => ({
            ticks: n.ticks,
            durationTicks: n.durationTicks,
            midi: n.midi,
            startBeat: (n.ticks - firstTick) / ppq,
            durationBeats: n.durationTicks / ppq
          }))
          .sort((a, b) => a.startBeat - b.startBeat)

        if (notes.length === 0) {
          voices.push([])
          continue
        }

        // Déterminer le nombre total de beats nécessaires
        const lastNoteEnd = Math.max(...notes.map(n => n.startBeat + n.durationBeats))
        const totalBeats = Math.ceil(lastNoteEnd) + 4 // marge

        // Initialiser le tableau des beats (null = vide)
        const beatContent = new Array(totalBeats).fill(null)

        // Parcourir toutes les notes dans l'ordre temporel
        notes.forEach(n => {
          const startFloat = n.startBeat
          let startIndex = Math.round(startFloat)
          const offset = startFloat - startIndex
          const isOffBeat = (offset > 0.35 && offset < 0.65)

          // S'assurer que startIndex est valide
          if (startIndex < 0) startIndex = 0

          const duration = Math.max(1, Math.round(n.durationBeats))
          const noteName = noteToSolfa(n.midi)

          // --- Gestion de la case de départ (beat où la note commence) ---
          let currentCell = beatContent[startIndex]

          if (isOffBeat) {
            // Contretemps : on préfixe avec '.' ou '- .' selon le contexte
            if (currentCell === null) {
              // Case vide -> nouvelle note en contretemps
              beatContent[startIndex] = ". " + noteName
            } else if (currentCell === "-") {
              // Case contient un tiret (note tenue depuis le beat précédent)
              // On combine : la tenue continue et on attaque une note en contretemps
              beatContent[startIndex] = "- . " + noteName
            } else {
              // Autre cas (note déjà présente, polyphonie sommaire)
              // On concatène avec un point (comportement original)
              beatContent[startIndex] = currentCell + " ." + noteName
            }
          } else {
            // Note sur le temps (pas de contretemps)
            if (currentCell === null) {
              beatContent[startIndex] = noteName
            } else {
              // Si la case est déjà occupée, on ajoute (rare en monodie)
              beatContent[startIndex] = currentCell + "." + noteName
            }
          }

          // --- Remplir les beats suivants avec des tirets (liaison) ---
          for (let j = 1; j < duration; j++) {
            const pos = startIndex + j
            if (pos >= beatContent.length) break

            const nextCell = beatContent[pos]
            if (nextCell === null) {
              beatContent[pos] = "-"
            }
            // Si déjà quelque chose, on ne l'écrase pas (pourrait être une autre note)
          }
        })

        // Convertir les null en chaînes vides pour l'affichage
        voices[v] = beatContent.map(cell => cell === null ? "" : cell)
      }

      // Déterminer la longueur maximale (pour uniformiser les voix)
      const maxLen = Math.max(...voices.map(v => v.length))
      const measures = Math.ceil(maxLen / meter)
      const totalBeats = measures * meter
      const beatsPerLine = 20  // nombre de beats par ligne de tableau

      // Générer le HTML
      let html = ""
      for (let start = 0; start < totalBeats; start += beatsPerLine) {
        html += "<table>"
        for (let v = 0; v < 4; v++) {
          html += "<tr>"
          for (let i = start; i < start + beatsPerLine; i++) {
            if (i >= totalBeats) break
            const note = (voices[v] && voices[v][i]) || ""
            const pos = i % meter
            const left = (pos === 0) ? "thick-left" : ""
            const right = (pos === meter - 1) ? "thick-right" : ""
            html += `<td class="${left} ${right}" contenteditable="false">${note}</td>`
          }
          html += "</tr>"
        }
        html += "</table>"
      }

      document.getElementById("score").innerHTML = html
      autoSave()
    }

    // ---------- Fonctions existantes inchangées ----------
    function toggleEdit() {
      editMode = !editMode
      document.querySelectorAll("#score td").forEach(td => {
        td.contentEditable = editMode
        if (editMode) {
          td.classList.add("editable")
        } else {
          td.classList.remove("editable")
        }
      })
    }

    function saveScore() {
      const html = document.getElementById("score").innerHTML
      localStorage.setItem("choraleScore", html)
      alert("Partition sauvegardée dans le navigateur")
    }

    function autoSave() {
      setInterval(() => {
        const html = document.getElementById("score").innerHTML
        localStorage.setItem("choraleScore", html)
      }, 5000)
    }

    window.onload = function () {
      const saved = localStorage.getItem("choraleScore")
      if (saved) {
        document.getElementById("score").innerHTML = saved
      }
    }

    async function playMidi() {
      if (!midiData) return
      await Tone.start()
      synth = new Tone.PolySynth(Tone.Synth).toDestination()
      const events = []
      midiData.tracks.forEach(track => {
        track.notes.forEach(note => {
          events.push({
            time: note.time,
            note: Tone.Frequency(note.midi, "midi"),
            duration: note.duration
          })
        })
      })
      part = new Tone.Part((time, value) => {
        synth.triggerAttackRelease(value.note, value.duration, time)
      }, events).start(0)
      Tone.Transport.start()
    }

    function stopMidi() {
      Tone.Transport.stop()
      if (part) {
        part.dispose()
      }
    }

    // ---------- EXPORT EXCEL AMÉLIORÉ : une seule feuille avec sauts de ligne ----------
    function exportExcel() {
      const tables = document.querySelectorAll("#score table")
      if (tables.length === 0) {
        alert("Rien à exporter")
        return
      }

      // Créer une nouvelle feuille de calcul
      const wsData = []
      let currentRow = 0

      tables.forEach((table, tableIndex) => {
        // Ajouter une ligne de séparation entre les groupes de 20 temps (sauf pour le premier)
        if (tableIndex > 0) {
          wsData.push([]) // ligne vide
          currentRow++
        }

        // Récupérer toutes les lignes de la table (4 voix)
        const rows = table.querySelectorAll("tr")
        rows.forEach(row => {
          const rowData = []
          const cells = row.querySelectorAll("td")
          cells.forEach(cell => {
            rowData.push(cell.innerText.trim())
          })
          wsData.push(rowData)
          currentRow++
        })
      })

      // Créer le classeur et la feuille unique
      const wb = XLSX.utils.book_new()
      const ws = XLSX.utils.aoa_to_sheet(wsData)

      // Ajuster la largeur des colonnes pour une meilleure lisibilité
      const colWidths = [{ wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }]
      ws['!cols'] = colWidths

      XLSX.utils.book_append_sheet(wb, ws, "Partition complète")
      XLSX.writeFile(wb, "chorale_complete.xlsx")
    }
  </script>
</body>

</html>
